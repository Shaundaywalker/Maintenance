name: Daily GAAP sync

# Pulls the last few days of GAAP data into the live dashboard once a day.
# 02:17 UTC ≈ 04:17 SAST. Syncs ONE store per request so each call is fast and
# never hits the gateway timeout (one big all-stores request used to time out).
on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync each store
        env:
          BASE: https://shaun-production.up.railway.app/api/sync/gaap
          SECRET: ${{ secrets.GAAP_SYNC_SECRET }}
        run: |
          set -euo pipefail
          echo "Fetching store list..."
          nodes=$(curl -sS --max-time 30 -H "x-sync-secret: $SECRET" "$BASE" | python3 -c "import sys,json;print('\n'.join(json.load(sys.stdin).get('nodes',[])))")
          count=$(printf '%s\n' "$nodes" | grep -c . || true)
          echo "Got $count nodes"
          if [ "$count" -eq 0 ]; then echo "::error::No nodes returned (auth or endpoint issue)"; exit 1; fi
          ok=0; fail=0
          while read -r n; do
            [ -z "$n" ] && continue
            code=$(curl -sS --max-time 120 -o /tmp/r.json -w "%{http_code}" \
              -X POST "$BASE" -H "Content-Type: application/json" -H "x-sync-secret: $SECRET" \
              -d "{\"node\":\"$n\"}" || echo "000")
            if [ "$code" = "200" ]; then ok=$((ok+1)); else fail=$((fail+1)); echo "  $n -> HTTP $code"; fi
          done <<< "$nodes"
          echo "Synced ok=$ok fail=$fail"
          if [ "$fail" -gt 0 ]; then echo "::warning::$fail store(s) failed to sync — see logs"; fi
